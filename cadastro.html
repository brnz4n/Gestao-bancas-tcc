<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvaliaTCC - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Estilo para centralizar o corpo da página */
        .body-cadastro-centered {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f9ff;
            padding: 20px; /* Adiciona padding para telas pequenas */
        }
    </style>
</head>

<body class="body-cadastro-centered">
    
    <div class="card p-4 shadow-lg rounded-3" style="width: 450px;">
        <h1 class="card-title text-center fw-bold mb-4 text-primary">Dados Cadastrais</h1>
        
        <form action="/submit" method="post" class="needs-validation" novalidate>
            
            <div class="mb-3">
                <label for="matricula" class="form-label fw-semibold">Matrícula SIAPE</label>
                <div class="input-group">
                    <input type="text" id="matricula" name="matricula" placeholder="Digite sua matrícula" required class="form-control rounded-pill pe-5">
                    <i class='bx bx-id-card position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>

            <div class="mb-3">
                <label for="nome" class="form-label fw-semibold">Nome Completo</label>
                <div class="input-group">
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required class="form-control rounded-pill pe-5">
                    <i class='bx bx-user position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>

            <div class="mb-3">
                <label for="cpf" class="form-label fw-semibold">CPF</label>
                <div class="input-group">
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" class="form-control rounded-pill pe-5">
                    <i class='bx bx-id-card position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>

            <div class="mb-3">
                <label for="senha" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required class="form-control rounded-pill pe-5">
                    <i class='bx bx-lock-alt position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>

            <div class="mb-3">
                <label for="csenha" class="form-label fw-semibold">Confirmar Senha</label>
                <div class="input-group">
                    <input type="password" id="csenha" name="csenha" placeholder="Confirme sua senha" required class="form-control rounded-pill pe-5">
                    <i class='bx bx-lock-alt position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="ncontato" class="form-label fw-semibold">Contato</label>
                <div class="input-group">
                    <input type="text" id="ncontato" name="numero" placeholder="Número de Contato" class="form-control rounded-pill pe-5">
                    <i class='bx bx-phone position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                <button id="btn-cadastrar" type="submit" class="btn btn-primary px-4 py-2 rounded-pill fw-bold">Cadastrar</button>
                <a href="login.html" class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-bold" role="button">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
