<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvaliaTCC - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Estilo para centralizar o corpo da página */
        .body-login-centered {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #e0f2fe; /* Cor de fundo suave */
        }
    </style>
</head>

<body class="body-login-centered">
    
    <div class="card p-4 shadow-lg rounded-3" style="width: 380px;">
        <h1 class="card-title text-center fw-bold mb-4 text-primary">Área de Login</h1>
        
        <form action="/submit" method="post">
            
            <div class="mb-3">
                <div class="input-group">
                    <input type="text" id="matricula" name="matricula" placeholder="E-mail" required class="form-control rounded-pill pe-5">
                    <i class='bx bx-user position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <input type="password" name="senha" id="senha" placeholder="Senha" required class="form-control rounded-pill pe-5">
                    <i class='bx bx-lock position-absolute top-50 end-0 translate-middle-y me-3 text-muted'></i>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" id="remember">
                    <label class="form-check-label text-muted" for="remember">
                        Lembre-se de mim
                    </label>
                </div>
                <a href="recuperaçao.html" class="forgot text-decoration-none text-primary fw-semibold">Esqueci minha senha</a>
            </div>

            <button type="submit" id="button" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">Entrar</button>
        </form>
        
        <p class="text-center mt-3 mb-0 text-muted">Ainda não tem uma conta? <a href="cadastro.html" class="text-primary fw-bold text-decoration-none">Cadastre-se aqui</a></p>
    </div>

</body>
</html>
