<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvaliaTCC - Cronograma</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        
        <header class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <div>
                <h2 class="fw-bold text-primary">Cronograma de Bancas</h2>
                <p class="text-muted mb-0">Confira as datas e locais das defesas de TCC.</p>
            </div>
            <a href="cadastro-ouvinte.html" class="btn btn-primary d-flex align-items-center fw-bold shadow-sm">
                <i class='bx bx-user-plus me-2'></i> Quero ser Ouvinte
            </a>
        </header>

        <div class="input-group mb-5 shadow-sm rounded-3">
            <input type="text" class="form-control form-control-lg" placeholder="Buscar por aluno ou tema">
            <input type="date" class="form-control form-control-lg flex-grow-0 w-auto">
            <button class="btn btn-primary btn-lg" type="button">
                <i class='bx bx-search'></i>
            </button>
        </div>

        <div class="schedule-container">
            
            <div class="day-group mb-5">
                <div class="d-flex align-items-center mb-3">
                    <span class="fs-1 fw-bold text-primary me-2">20</span>
                    <div class="d-flex flex-column lh-sm">
                        <span class="fw-bold text-dark">Segunda-feira</span>
                        <span class="text-muted text-uppercase">Novembro</span>
                    </div>
                </div>

                <div class="row row-cols-1 g-3">
                    
                    <div class="col">
                        <div class="card shadow-sm border-start border-primary border-4 h-100">
                            <div class="card-body d-flex align-items-center justify-content-between p-3 p-md-4">
                                
                                <span class="fw-bold fs-5 text-primary me-3 flex-shrink-0">14:00</span>
                                
                                <div class="flex-grow-1 me-3">
                                    <h5 class="card-title fw-semibold mb-1 text-dark">Análise de Músicas Infantis</h5>
                                    <p class="card-text text-muted mb-0">Aluno: João Silva</p>
                                    <p class="card-text text-primary mb-0 mt-1 d-flex align-items-center">
                                        <i class='bx bx-map me-1'></i> Sala 104
                                    </p>
                                </div>
                                
                                <button class="btn btn-outline-primary fw-bold flex-shrink-0">Inscrever-se</button>
                            </div>
                        </div>
                    </div>

                    <div class="col">
                        <div class="card shadow-sm border-start border-secondary border-4 h-100">
                            <div class="card-body d-flex align-items-center justify-content-between p-3 p-md-4">
                                
                                <span class="fw-bold fs-5 text-secondary me-3 flex-shrink-0">16:00</span>
                                
                                <div class="flex-grow-1 me-3">
                                    <h5 class="card-title fw-semibold mb-1 text-dark">Desenvolvimento Web com React</h5>
                                    <p class="card-text text-muted mb-0">Aluno: Maria Souza</p>
                                    <p class="card-text text-secondary mb-0 mt-1 d-flex align-items-center">
                                        <i class='bx bx-map me-1'></i> Lab 03
                                    </p>
                                </div>
                                
                                <button class="btn btn-outline-secondary fw-bold flex-shrink-0">Inscrever-se</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            
            </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
